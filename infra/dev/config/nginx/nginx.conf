# FlowMate Dev 환경 Nginx 설정
# 로컬에서 Docker Compose 전체 스택 테스트 시 사용
# HTTP only, 모든 Actuator 엔드포인트 노출 (디버깅 편의)

# Docker Compose 내부 네트워크에서 backend 컨테이너로 연결
upstream backend {
    server backend:8080;
}

server {
    listen 80;
    # 로컬 테스트: localhost / 서버 배포 시: dev.flowmate.io.kr
    server_name localhost dev.flowmate.io.kr;

    # 클라이언트 요청 최대 크기 (파일 업로드 등)
    client_max_body_size 10M;

    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # ----------------------------------------
    # Frontend (React SPA)
    # ----------------------------------------
    location / {
        root /usr/share/nginx/html;
        index index.html;
        # 존재하지 않는 경로는 index.html로 폴백 (SPA 클라이언트 라우팅)
        try_files $uri $uri/ /index.html;

        # HTML은 캐시 안 함 (항상 최신 버전 보장)
        location ~* \.html$ {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Pragma "no-cache";
            add_header Expires "0";
        }

        # JS/CSS는 1시간만 캐시 (Dev: 짧게, Prod는 1년)
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1h;
            add_header Cache-Control "public, immutable";
        }
    }

    # ----------------------------------------
    # Backend API 리버스 프록시
    # /api/* → backend 컨테이너 8080포트로 전달
    # ----------------------------------------
    location /api {
        proxy_pass http://backend;
        proxy_http_version 1.1;

        # 실제 클라이언트 IP 등 원본 정보를 백엔드에 전달
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # ----------------------------------------
    # Spring Boot Actuator
    # Dev: /actuator/* 전체 노출 (Prod는 /actuator/health만 노출)
    # ----------------------------------------
    location /actuator {
        proxy_pass http://backend;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ----------------------------------------
    # Nginx 자체 헬스 체크
    # Docker healthcheck 및 외부 모니터링에서 사용
    # ----------------------------------------
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}
