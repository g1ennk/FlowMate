# FlowMate Dev Environment Docker Compose
# 실행: cd infra/dev && docker compose up -d

services:
  # MySQL Database (internal only)
  mysql:
    image: mysql:${MYSQL_VERSION:-8.0}
    container_name: flowmate-mysql-dev
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      TZ: ${TZ:-Asia/Seoul}
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_0900_ai_ci
      - --default-authentication-plugin=mysql_native_password
    volumes:
      - mysql-data-dev:/var/lib/mysql
    networks:
      - flowmate-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Spring Boot Backend
  backend:
    image: ${ECR_IMAGE_URI}
    container_name: flowmate-backend-dev
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
      DB_HOST: ${DB_HOST:-mysql}
      DB_PORT: ${DB_PORT:-3306}
      DB_NAME: ${DB_NAME}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      KAKAO_CLIENT_ID: ${KAKAO_CLIENT_ID}
      KAKAO_CLIENT_SECRET: ${KAKAO_CLIENT_SECRET}
      KAKAO_REDIRECT_URI: ${KAKAO_REDIRECT_URI}
      CORS_ORIGINS: ${CORS_ORIGINS}
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "127.0.0.1:${BACKEND_BIND_PORT:-8080}:8080"
    networks:
      - flowmate-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Grafana Alloy (메트릭 + 로그 + 트레이스 수집 → Grafana Cloud)
  alloy:
    image: grafana/alloy:${ALLOY_VERSION:-v1.8.3}
    container_name: flowmate-alloy-dev
    restart: unless-stopped
    command:
      - run
      - /etc/alloy/config.alloy
      - --server.http.listen-addr=0.0.0.0:12345
    environment:
      GRAFANA_CLOUD_METRICS_URL: ${GRAFANA_CLOUD_METRICS_URL}
      GRAFANA_CLOUD_METRICS_USER: ${GRAFANA_CLOUD_METRICS_USER}
      GRAFANA_CLOUD_LOGS_URL: ${GRAFANA_CLOUD_LOGS_URL}
      GRAFANA_CLOUD_LOGS_USER: ${GRAFANA_CLOUD_LOGS_USER}
      GRAFANA_CLOUD_TEMPO_ENDPOINT: ${GRAFANA_CLOUD_TEMPO_ENDPOINT}
      GRAFANA_CLOUD_TEMPO_USER: ${GRAFANA_CLOUD_TEMPO_USER}
      GRAFANA_CLOUD_API_KEY: ${GRAFANA_CLOUD_API_KEY}
    volumes:
      - ./config/alloy/config.alloy:/etc/alloy/config.alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    pid: "host"
    ports:
      - "12345:12345"
    depends_on:
      - backend
    networks:
      - flowmate-network

networks:
  flowmate-network:
    driver: bridge

volumes:
  mysql-data-dev:
    driver: local
