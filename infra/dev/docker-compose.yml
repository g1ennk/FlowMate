# FlowMate Dev Environment Docker Compose
# 실행: cd infra/dev && docker compose up -d

services:
  # MySQL Database
  mysql:
    image: mysql:${MYSQL_VERSION:-8.0}
    container_name: flowmate-mysql-dev
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      TZ: ${TZ:-Asia/Seoul}
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_0900_ai_ci
      - --default-authentication-plugin=mysql_native_password
    volumes:
      - mysql-data-dev:/var/lib/mysql
    ports:
      - "3306:3306"  # Dev 환경에서는 로컬 접근 허용
    networks:
      - flowmate-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Spring Boot Backend
  backend:
    build:
      context: ../../backend
      dockerfile: Dockerfile
    container_name: flowmate-backend-dev
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
      DB_HOST: ${DB_HOST:-mysql}
      DB_PORT: ${DB_PORT:-3306}
      DB_NAME: ${DB_NAME}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      CORS_ORIGINS: ${CORS_ORIGINS}
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - flowmate-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Nginx (Frontend + Reverse Proxy)
  nginx:
    image: nginx:1.27-alpine
    container_name: flowmate-nginx-dev
    restart: unless-stopped
    ports:
      - "${NGINX_PORT:-80}:80"
    volumes:
      - ./config/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - frontend-dist:/usr/share/nginx/html:ro
    depends_on:
      - backend
    networks:
      - flowmate-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1/health"]
      interval: 30s
      timeout: 3s
      retries: 3

  # Frontend Builder (일회성 빌드)
  frontend-builder:
    build:
      context: ../../frontend
      dockerfile: Dockerfile
      target: builder
      args:
        - VITE_API_BASE_URL=${VITE_API_BASE_URL}
        - VITE_USE_MOCK=${VITE_USE_MOCK:-false}
    container_name: flowmate-frontend-builder-dev
    volumes:
      - frontend-dist:/app/dist
    command: sh -c "pnpm build && cp -r /app/dist/* /app/dist/"
    networks:
      - flowmate-network

  # Prometheus (메트릭 수집)
  prometheus:
    image: prom/prometheus:latest
    container_name: flowmate-prometheus-dev
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=7d'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    volumes:
      - ./config/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data-dev:/prometheus
    ports:
      - "9090:9090"  # Dev 환경에서는 직접 접근 허용
    depends_on:
      - backend
    networks:
      - flowmate-network

  # Grafana (메트릭 시각화)
  grafana:
    image: grafana/grafana:latest
    container_name: flowmate-grafana-dev
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_INSTALL_PLUGINS: ''
    volumes:
      - grafana-data-dev:/var/lib/grafana
      - ./config/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3000:3000"  # Dev 환경에서는 직접 접근 허용
    depends_on:
      - prometheus
    networks:
      - flowmate-network

  # Node Exporter (시스템 메트릭)
  node-exporter:
    image: prom/node-exporter:latest
    container_name: flowmate-node-exporter-dev
    restart: unless-stopped
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    ports:
      - "9100:9100"  # Dev 환경에서는 직접 접근 허용
    networks:
      - flowmate-network

networks:
  flowmate-network:
    driver: bridge

volumes:
  mysql-data-dev:
    driver: local
  prometheus-data-dev:
    driver: local
  grafana-data-dev:
    driver: local
  frontend-dist:
    driver: local
