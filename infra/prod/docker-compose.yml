# FlowMate Production Environment Docker Compose
# 실행: cd infra/prod && ECR_IMAGE_URI=<ecr-image-uri:tag> docker compose up -d

services:
  # MySQL Database
  mysql:
    image: mysql:${MYSQL_VERSION:-8.0}
    container_name: flowmate-mysql-prod
    restart: always
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      TZ: ${TZ:-Asia/Seoul}
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_0900_ai_ci
      - --default-authentication-plugin=mysql_native_password
      - --max-connections=200
      - --innodb-buffer-pool-size=512M
    volumes:
      - mysql-data-prod:/var/lib/mysql
    networks:
      - flowmate-network
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # Spring Boot Backend
  backend:
    image: ${ECR_IMAGE_URI:-flowmate-backend:placeholder}
    container_name: flowmate-backend-prod
    restart: always
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      DB_HOST: ${DB_HOST:-mysql}
      DB_PORT: ${DB_PORT:-3306}
      DB_NAME: ${DB_NAME}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      COOKIE_SECURE: ${COOKIE_SECURE:-true}
      KAKAO_CLIENT_ID: ${KAKAO_CLIENT_ID}
      KAKAO_CLIENT_SECRET: ${KAKAO_CLIENT_SECRET}
      KAKAO_REDIRECT_URI: ${KAKAO_REDIRECT_URI}
      CORS_ORIGINS: ${CORS_ORIGINS}
      JAVA_OPTS: >-
        -Xms512m
        -Xmx1024m
        -XX:+UseG1GC
        -XX:MaxGCPauseMillis=200
        -XX:+HeapDumpOnOutOfMemoryError
        -XX:HeapDumpPath=/tmp/heapdump.hprof
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "127.0.0.1:${BACKEND_BIND_PORT:-8080}:8080"
    networks:
      - flowmate-network
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/actuator/health" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # PostgreSQL for AI Service
  postgres:
    image: postgres:16-alpine
    container_name: flowmate-postgres-prod
    restart: always
    environment:
      POSTGRES_DB: flowmate_reports
      POSTGRES_USER: flowmate
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data-prod:/var/lib/postgresql/data
      - ../../ai-service/migrations/001-create-reports.sql:/docker-entrypoint-initdb.d/001-create-reports.sql:ro
    networks:
      - flowmate-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U flowmate -d flowmate_reports" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # NestJS AI Service
  ai-service:
    image: ${AI_SERVICE_IMAGE:-flowmate-ai-service:placeholder}
    container_name: flowmate-ai-service-prod
    restart: always
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_NAME: flowmate_reports
      DATABASE_USER: flowmate
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      FLOWMATE_API_URL: http://backend:8080/api
      PORT: 3000
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - flowmate-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Grafana Alloy (메트릭 + 로그 + 트레이스 수집 → Grafana Cloud)
  alloy:
    image: grafana/alloy:${ALLOY_VERSION:-v1.8.3}
    container_name: flowmate-alloy-prod
    hostname: flowmate-host-prod
    restart: always
    command:
      - run
      - /etc/alloy/config.alloy
      - --server.http.listen-addr=0.0.0.0:12345
    environment:
      GRAFANA_CLOUD_METRICS_URL: ${GRAFANA_CLOUD_METRICS_URL}
      GRAFANA_CLOUD_METRICS_USER: ${GRAFANA_CLOUD_METRICS_USER}
      GRAFANA_CLOUD_LOGS_URL: ${GRAFANA_CLOUD_LOGS_URL}
      GRAFANA_CLOUD_LOGS_USER: ${GRAFANA_CLOUD_LOGS_USER}
      GRAFANA_CLOUD_TEMPO_ENDPOINT: ${GRAFANA_CLOUD_TEMPO_ENDPOINT}
      GRAFANA_CLOUD_TEMPO_USER: ${GRAFANA_CLOUD_TEMPO_USER}
      GRAFANA_CLOUD_API_KEY: ${GRAFANA_CLOUD_API_KEY}
    volumes:
      - ./config/alloy/config.alloy:/etc/alloy/config.alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    pid: "host"
    ports:
      - "127.0.0.1:12345:12345"
    depends_on:
      - backend
    networks:
      - flowmate-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  flowmate-network:
    driver: bridge

volumes:
  mysql-data-prod:
    driver: local
  postgres-data-prod:
    driver: local
