# FlowMate Production Environment Docker Compose
# 실행: cd infra/prod && docker compose up -d

services:
  # MySQL Database
  mysql:
    image: mysql:${MYSQL_VERSION:-8.0}
    container_name: flowmate-mysql-prod
    restart: always
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      TZ: ${TZ:-Asia/Seoul}
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_0900_ai_ci
      - --default-authentication-plugin=mysql_native_password
      - --max-connections=200
      - --innodb-buffer-pool-size=512M
    volumes:
      - mysql-data-prod:/var/lib/mysql
      - ../../shared/backups:/backups  # 백업 디렉토리
    networks:
      - flowmate-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
    # Prod 환경에서는 외부 포트 노출 안 함 (보안)

  # Spring Boot Backend
  backend:
    build:
      context: ../../backend
      dockerfile: Dockerfile
    image: flowmate-backend:prod
    container_name: flowmate-backend-prod
    restart: always
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      DB_HOST: ${DB_HOST:-mysql}
      DB_PORT: ${DB_PORT:-3306}
      DB_NAME: ${DB_NAME}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      CORS_ORIGINS: ${CORS_ORIGINS}
      # JVM 옵션 (메모리 최적화)
      JAVA_OPTS: >-
        -Xms512m
        -Xmx1024m
        -XX:+UseG1GC
        -XX:MaxGCPauseMillis=200
        -XX:+HeapDumpOnOutOfMemoryError
        -XX:HeapDumpPath=/tmp/heapdump.hprof
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - flowmate-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Nginx (Frontend + Reverse Proxy + HTTPS)
  nginx:
    image: nginx:1.27-alpine
    container_name: flowmate-nginx-prod
    restart: always
    ports:
      - "${NGINX_PORT:-80}:80"
      - "${NGINX_SSL_PORT:-443}:443"
    volumes:
      - ./config/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - frontend-dist:/usr/share/nginx/html:ro
      - ../../shared/certbot/conf:/etc/letsencrypt:ro  # SSL 인증서
      - ../../shared/certbot/www:/var/www/certbot:ro   # ACME Challenge
    depends_on:
      - backend
    networks:
      - flowmate-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1/health"]
      interval: 30s
      timeout: 3s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Certbot (Let's Encrypt SSL 인증서 갱신)
  certbot:
    image: certbot/certbot:latest
    container_name: flowmate-certbot-prod
    volumes:
      - ../../shared/certbot/conf:/etc/letsencrypt
      - ../../shared/certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    networks:
      - flowmate-network

  # Frontend Builder (일회성 빌드 후 종료)
  frontend-builder:
    build:
      context: ../../frontend
      dockerfile: Dockerfile
      target: builder
      args:
        - VITE_API_BASE_URL=${VITE_API_BASE_URL}
        - VITE_USE_MOCK=${VITE_USE_MOCK:-false}
    container_name: flowmate-frontend-builder-prod
    volumes:
      - frontend-dist:/app/dist
    command: sh -c "pnpm build && cp -r /app/dist/* /app/dist/"
    networks:
      - flowmate-network

  # Prometheus (메트릭 수집)
  prometheus:
    image: prom/prometheus:latest
    container_name: flowmate-prometheus-prod
    restart: always
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'  # Prod는 30일 보관
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    volumes:
      - ./config/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data-prod:/prometheus
    depends_on:
      - backend
    networks:
      - flowmate-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    # Prod 환경에서는 외부 포트 노출 안 함 (보안)

  # Grafana (메트릭 시각화)
  grafana:
    image: grafana/grafana:latest
    container_name: flowmate-grafana-prod
    restart: always
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_SERVER_ROOT_URL: https://${DOMAIN_NAME}/grafana
      GF_INSTALL_PLUGINS: ''
    volumes:
      - grafana-data-prod:/var/lib/grafana
      - ./config/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
    networks:
      - flowmate-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    # Prod 환경에서는 외부 포트 노출 안 함 (Nginx 리버스 프록시 사용)

  # Node Exporter (시스템 메트릭)
  node-exporter:
    image: prom/node-exporter:latest
    container_name: flowmate-node-exporter-prod
    restart: always
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    networks:
      - flowmate-network
    # Prod 환경에서는 외부 포트 노출 안 함 (Prometheus만 접근)

networks:
  flowmate-network:
    driver: bridge

volumes:
  mysql-data-prod:
    driver: local
  prometheus-data-prod:
    driver: local
  grafana-data-prod:
    driver: local
  frontend-dist:
    driver: local
