# FlowMate Prod 환경 Nginx 설정
# HTTPS only, 보안 헤더, Gzip 압축, Actuator 제한

# Docker Compose 내부 네트워크에서 backend 컨테이너로 연결
upstream backend {
    server backend:8080;
}

# ----------------------------------------
# HTTP → HTTPS 리다이렉트
# ----------------------------------------
server {
    listen 80;
    server_name flowmate.io.kr www.flowmate.io.kr;

    # Let's Encrypt 인증서 발급 시 도메인 소유 확인용 (ACME Challenge)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # 나머지 모든 HTTP 요청은 HTTPS로 영구 리다이렉트
    location / {
        return 301 https://$host$request_uri;
    }
}

# ----------------------------------------
# HTTPS 서버
# ----------------------------------------
server {
    listen 443 ssl http2;
    server_name flowmate.io.kr www.flowmate.io.kr;

    # Let's Encrypt 인증서 (Certbot이 자동 갱신)
    ssl_certificate /etc/letsencrypt/live/flowmate.io.kr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/flowmate.io.kr/privkey.pem;

    # TLS 1.2/1.3만 허용 (구버전 프로토콜 차단)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # HSTS: 브라우저가 1년간 HTTPS만 사용하도록 강제
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # 보안 헤더
    add_header X-Frame-Options "SAMEORIGIN" always;         # 클릭재킹 방지
    add_header X-Content-Type-Options "nosniff" always;     # MIME 타입 스니핑 방지
    add_header X-XSS-Protection "1; mode=block" always;    # XSS 필터 활성화
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # 클라이언트 요청 최대 크기
    client_max_body_size 10M;

    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log warn;

    # ----------------------------------------
    # Frontend (React SPA)
    # ----------------------------------------
    location / {
        root /usr/share/nginx/html;
        index index.html;
        # 존재하지 않는 경로는 index.html로 폴백 (SPA 클라이언트 라우팅)
        try_files $uri $uri/ /index.html;

        # HTML은 캐시 안 함 (항상 최신 버전 보장)
        location ~* \.html$ {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Pragma "no-cache";
            add_header Expires "0";
        }

        # JS/CSS는 1년 캐시 (Vite 빌드 시 파일명에 해시 포함되므로 안전)
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # ----------------------------------------
    # Backend API 리버스 프록시
    # /api/* → backend 컨테이너 8080포트로 전달
    # ----------------------------------------
    location /api {
        proxy_pass http://backend;
        proxy_http_version 1.1;

        # 실제 클라이언트 IP 등 원본 정보를 백엔드에 전달
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # 프록시 버퍼링 (응답을 메모리에 버퍼링하여 백엔드 부하 감소)
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
        proxy_busy_buffers_size 8k;
    }

    # ----------------------------------------
    # Spring Boot Actuator
    # Prod: /actuator/health만 외부 노출, 나머지는 403 차단
    # ----------------------------------------
    location /actuator/health {
        proxy_pass http://backend;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        access_log off;
    }

    # /actuator/health 외 나머지 엔드포인트 차단 (정보 노출 방지)
    location /actuator {
        deny all;
        return 403;
    }

    # ----------------------------------------
    # Nginx 자체 헬스 체크
    # Docker healthcheck 및 외부 모니터링에서 사용
    # ----------------------------------------
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # ----------------------------------------
    # Gzip 압축 (전송 용량 감소)
    # ----------------------------------------
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss application/rss+xml font/truetype font/opentype application/vnd.ms-fontobject image/svg+xml;
}
