# Prometheus 설정 (Production Environment)

global:
  scrape_interval: 15s      # 메트릭 수집 간격
  evaluation_interval: 15s  # 규칙 평가 간격
  external_labels:
    monitor: 'flowmate-monitor-prod'
    environment: 'prod'

# 메트릭 수집 대상
scrape_configs:
  # Prometheus 자체 모니터링
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Spring Boot Backend 메트릭
  - job_name: 'spring-backend'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['backend:8080']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'flowmate-backend-prod'

  # Node Exporter (시스템 메트릭)
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'flowmate-host-prod'

