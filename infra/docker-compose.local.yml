services:
  mysql:
    ports:
      - "${MYSQL_PORT}:3306"   # 로컬에서만 노출


# MySQL 컨테이너 실행 커맨드
# - docker-compose.yml        : 공통(MySQL 서비스, 볼륨 등) 정의
# - docker-compose.local.yml  : 로컬 환경 전용 설정 (포트 노출 등)
# - infra/.env.local          : MySQL 계정/포트/DB 이름 등 환경변수
#
# 이 조합으로 실행하면:
# 1) MySQL 컨테이너(flowmate-mysql)가 생성/실행되고
# 2) 로컬 3306 포트 → 컨테이너 3306 포트로 포워딩되며
# 3) Spring Boot(local profile)에서 바로 접속 가능

#  docker compose \
#  --env-file infra/.env.local \
#  -f infra/docker-compose.yml \
#  -f infra/docker-compose.local.yml \
#  up -d


# MySQL 컨테이너 내부 접속 (개발/디버깅용)
# - 실행 중인 MySQL 컨테이너에 직접 접속
# - flowmate 유저로 로그인하여
#   DB, 테이블, 데이터 상태를 직접 확인할 때 사용
#
# 비밀번호는 infra/.env.local 의 MYSQL_PASSWORD 값

# docker exec
# -it
# flowmate-mysql
# mysql -u flowmate -p