services:
  mysql:
    image: mysql:8.0
    container_name: flowmate-mysql-local
    environment:
      MYSQL_DATABASE: flowmate
      MYSQL_USER: flowmate
      MYSQL_PASSWORD: flowmate
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - mysql_local_data:/var/lib/mysql
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "flowmate", "-pflowmate" ]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mysql_local_data:
