spring:
  config:
    activate:
      on-profile: dev

  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:flowmate}?serverTimezone=Asia/Seoul&useSSL=true
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate # Flyway만 스키마 관리

    properties:
      hibernate:
        format_sql: false  # 운영 환경에선 포맷팅 비활성화

  flyway:
    enabled: true
    locations: classpath:db/migration
    validate-on-migrate: true  # 마이그레이션 검증

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    kr.io.flowmate: info
    org.hibernate.SQL: warn

cors:
  allowed-origins: ${CORS_ORIGINS:http://localhost:5173}
